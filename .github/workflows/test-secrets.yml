name: Test Infisical

on:
  workflow_dispatch:

jobs:
  check-infisical:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Infisical Token
        id: infisical
        run: |
          echo "=== Testing Infisical Authentication ==="
          echo "CLIENT_ID set: $([ -z '${{ secrets.INFISICAL_CLIENT_ID }}' ] && echo 'NO ✗' || echo 'YES ✓')"
          echo "CLIENT_SECRET set: $([ -z '${{ secrets.INFISICAL_CLIENT_SECRET }}' ] && echo 'NO ✗' || echo 'YES ✓')"
          echo "PROJECT_ID set: $([ -z '${{ secrets.INFISICAL_PROJECT_ID }}' ] && echo 'NO ✗' || echo 'YES ✓')"
          
          if [ -z '${{ secrets.INFISICAL_CLIENT_ID }}' ] || [ -z '${{ secrets.INFISICAL_CLIENT_SECRET }}' ]; then
            echo "❌ Missing INFISICAL_CLIENT_ID or INFISICAL_CLIENT_SECRET"
            exit 1
          fi
          
          echo "Generating token..."
          INFISICAL_TOKEN=$(npx @infisical/cli@0.43.40 login \
            --method=universal-auth \
            --client-id='${{ secrets.INFISICAL_CLIENT_ID }}' \
            --client-secret='${{ secrets.INFISICAL_CLIENT_SECRET }}' \
            --silent \
            --plain)
          
          if [ -z "$INFISICAL_TOKEN" ]; then
            echo "❌ Failed to generate token"
            exit 1
          fi
          
          echo "✅ Token generated successfully!"
          echo "Token length: ${#INFISICAL_TOKEN} characters"
          
          # Store token for next step
          echo "INFISICAL_TOKEN=$INFISICAL_TOKEN" >> $GITHUB_ENV

      - name: Fetch Secrets from Infisical
        run: |
          echo "=== Fetching Secrets from Infisical ==="
          echo "PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}"
          echo "ENVIRONMENT: prod"
          echo "SECRET_PATH: /annam-ajrasakha/WhatsApp"
          
          npx @infisical/cli@0.43.40 secrets \
            --env=prod \
            --path=/annam-ajrasakha/WhatsApp \
            --projectId='${{ secrets.INFISICAL_PROJECT_ID }}' \
            --token='${{ env.INFISICAL_TOKEN }}' \
            --plain
