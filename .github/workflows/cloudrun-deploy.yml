name: Build & Deploy to Cloud Run (Staging & Production)

on:
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: "Deploy to Staging?"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      deploy_production:
        description: "Deploy to Production?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      should_build:
        description: "Build and Push Image?"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  NODE_VERSION: '20'
  DOCKER_IMAGE: ajrasakha-wa-client
  GCP_REGION: asia-south1
  GCP_STAGING_SERVICE: wa-client-staging
  GCP_PRODUCTION_SERVICE: wa-client-production
  INFISICAL_ENVIRONMENT_STAGING: staging
  INFISICAL_ENVIRONMENT_PROD: prod
  INFISICAL_SECRET_PATH: /annam-ajrasakha/WhatsApp

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    if: github.event.inputs.should_build == 'true'
    environment:
      name: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:production
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          build-args: |
            NODE_ENV=production

  deploy_staging:
    name: Deploy to Cloud Run (Staging)
    if: |
      always() &&
      github.event.inputs.deploy_staging == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped' || needs.build.result == null)
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_GH_SA_KEY }}'


      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        timeout-minutes: 10
        with:
          service: ${{ env.GCP_STAGING_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:staging
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          env_vars: |
            NODE_ENV=staging
            INFISICAL_ENVIRONMENT=${{ env.INFISICAL_ENVIRONMENT_STAGING }}
            INFISICAL_PROJECT_ID=${{ secrets.INFISICAL_PROJECT_ID }}
            INFISICAL_SECRET_PATH=${{ env.INFISICAL_SECRET_PATH }}
            INFISICAL_CLIENT_ID=${{ secrets.INFISICAL_CLIENT_ID }}
            INFISICAL_CLIENT_SECRET=${{ secrets.INFISICAL_CLIENT_SECRET }}
          flags: --allow-unauthenticated --port=3000 --memory=1Gi --min-instances=0 --timeout=300

  deploy_production:
    name: Deploy to Cloud Run (Production)
    if: |
      always() &&
      github.event.inputs.deploy_production == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped' || needs.build.result == null)
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_GH_SA_KEY }}'


      - name: Deploy to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        timeout-minutes: 10
        with:
          service: ${{ env.GCP_PRODUCTION_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:production
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          env_vars: |
            NODE_ENV=production
            INFISICAL_ENVIRONMENT=${{ env.INFISICAL_ENVIRONMENT_PROD }}
            INFISICAL_PROJECT_ID=${{ secrets.INFISICAL_PROJECT_ID }}
            INFISICAL_SECRET_PATH=${{ env.INFISICAL_SECRET_PATH }}
            INFISICAL_CLIENT_ID=${{ secrets.INFISICAL_CLIENT_ID }}
            INFISICAL_CLIENT_SECRET=${{ secrets.INFISICAL_CLIENT_SECRET }}
          flags: --allow-unauthenticated --port=3000 --memory=1Gi --min-instances=0 --timeout=300
