name: Build & Deploy to Cloud Run (Staging & Production)

on:
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: "Deploy to Staging?"
        required: true
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      deploy_production:
        description: "Deploy to Production?"
        required: true
        default: "false"
        You type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  NODE_VERSION: '20'
  DOCKER_IMAGE: ajrasakha-wa-client
  GCP_REGION: asia-south1
  GCP_STAGING_SERVICE: wa-client-staging
  GCP_PRODUCTION_SERVICE: wa-client-production

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    # Always build - deployment requires a fresh image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          no-cache: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:production
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          build-args: |
            NODE_ENV=production

  deploy_staging:
    name: Deploy to Cloud Run (Staging)
    if: |
      always() &&
      github.event.inputs.deploy_staging == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped' || needs.build.result == null)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_GH_SA_KEY }}'

      - name: Debug - Check which secrets are empty
        run: |
          echo "=== Checking GitHub Secrets ==="
          echo "MONGO_URI: $([ -z '${{ secrets.MONGO_URI }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_ACCESS_TOKEN: $([ -z '${{ secrets.WHATSAPP_ACCESS_TOKEN }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_PHONE_NUMBER_ID: $([ -z '${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_WEBHOOK_VERIFY_TOKEN: $([ -z '${{ secrets.WHATSAPP_WEBHOOK_VERIFY_TOKEN }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_API_VERSION: $([ -z '${{ secrets.WHATSAPP_API_VERSION }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_META_APP_SECRET: $([ -z '${{ secrets.WHATSAPP_META_APP_SECRET }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "LLM_API_KEY: $([ -z '${{ secrets.LLM_API_KEY }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "LLM_BASE_URL: $([ -z '${{ secrets.LLM_BASE_URL }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "LLM_MODEL: $([ -z '${{ secrets.LLM_MODEL }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "GEMINI_API_KEY: $([ -z '${{ secrets.GEMINI_API_KEY }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "SARVAM_API_KEY: $([ -z '${{ secrets.SARVAM_API_KEY }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "REVIEWER_API_BASE_URL: $([ -z '${{ secrets.REVIEWER_API_BASE_URL }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "REVIEWER_INTERNAL_API_KEY: $([ -z '${{ secrets.REVIEWER_INTERNAL_API_KEY }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "AEGRA_ASSISTANT_ID: $([ -z '${{ secrets.AEGRA_ASSISTANT_ID }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "AEGRA_BASE_URL: $([ -z '${{ secrets.AEGRA_BASE_URL }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "=== End Check ==="

      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        timeout-minutes: 10
        with:
          service: ${{ env.GCP_STAGING_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          env_vars: |
            NODE_ENV=staging
            MONGO_URI=${{ secrets.MONGO_URI }}
            WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }}
            WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
            WHATSAPP_WEBHOOK_VERIFY_TOKEN=${{ secrets.WHATSAPP_WEBHOOK_VERIFY_TOKEN }}
            WHATSAPP_API_VERSION=${{ secrets.WHATSAPP_API_VERSION }}
            WHATSAPP_META_APP_SECRET=${{ secrets.WHATSAPP_META_APP_SECRET }}
            LLM_API_KEY=${{ secrets.LLM_API_KEY }}
            LLM_BASE_URL=${{ secrets.LLM_BASE_URL }}
            LLM_MODEL=${{ secrets.LLM_MODEL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            SARVAM_API_KEY=${{ secrets.SARVAM_API_KEY }}
            REVIEWER_API_BASE_URL=${{ secrets.REVIEWER_API_BASE_URL }}
            REVIEWER_INTERNAL_API_KEY=${{ secrets.REVIEWER_INTERNAL_API_KEY }}
            AEGRA_ASSISTANT_ID=${{ secrets.AEGRA_ASSISTANT_ID }}
            AEGRA_BASE_URL=${{ secrets.AEGRA_BASE_URL }}
          flags: --allow-unauthenticated --port=3000 --memory=1Gi --min-instances=0 --timeout=300

  deploy_production:
    name: Deploy to Cloud Run (Production)
    if: |
      always() &&
      github.event.inputs.deploy_production == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped' || needs.build.result == null)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_GH_SA_KEY }}'

      - name: Debug - Check which secrets are empty
        run: |
          echo "=== Checking GitHub Secrets ==="
          echo "MONGO_URI: $([ -z '${{ secrets.MONGO_URI }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_ACCESS_TOKEN: $([ -z '${{ secrets.WHATSAPP_ACCESS_TOKEN }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_PHONE_NUMBER_ID: $([ -z '${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_WEBHOOK_VERIFY_TOKEN: $([ -z '${{ secrets.WHATSAPP_WEBHOOK_VERIFY_TOKEN }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_API_VERSION: $([ -z '${{ secrets.WHATSAPP_API_VERSION }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "WHATSAPP_META_APP_SECRET: $([ -z '${{ secrets.WHATSAPP_META_APP_SECRET }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "LLM_API_KEY: $([ -z '${{ secrets.LLM_API_KEY }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "LLM_BASE_URL: $([ -z '${{ secrets.LLM_BASE_URL }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "LLM_MODEL: $([ -z '${{ secrets.LLM_MODEL }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "GEMINI_API_KEY: $([ -z '${{ secrets.GEMINI_API_KEY }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "SARVAM_API_KEY: $([ -z '${{ secrets.SARVAM_API_KEY }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "REVIEWER_API_BASE_URL: $([ -z '${{ secrets.REVIEWER_API_BASE_URL }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "REVIEWER_INTERNAL_API_KEY: $([ -z '${{ secrets.REVIEWER_INTERNAL_API_KEY }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "AEGRA_ASSISTANT_ID: $([ -z '${{ secrets.AEGRA_ASSISTANT_ID }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "AEGRA_BASE_URL: $([ -z '${{ secrets.AEGRA_BASE_URL }}' ] && echo 'EMPTY ✗' || echo 'SET ✓')"
          echo "=== End Check ==="

      - name: Deploy to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        timeout-minutes: 10
        with:
          service: ${{ env.GCP_PRODUCTION_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          env_vars: |
            NODE_ENV=production
            MONGO_URI=${{ secrets.MONGO_URI }}
            WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }}
            WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
            WHATSAPP_WEBHOOK_VERIFY_TOKEN=${{ secrets.WHATSAPP_WEBHOOK_VERIFY_TOKEN }}
            WHATSAPP_API_VERSION=${{ secrets.WHATSAPP_API_VERSION }}
            WHATSAPP_META_APP_SECRET=${{ secrets.WHATSAPP_META_APP_SECRET }}
            LLM_API_KEY=${{ secrets.LLM_API_KEY }}
            LLM_BASE_URL=${{ secrets.LLM_BASE_URL }}
            LLM_MODEL=${{ secrets.LLM_MODEL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            SARVAM_API_KEY=${{ secrets.SARVAM_API_KEY }}
            REVIEWER_API_BASE_URL=${{ secrets.REVIEWER_API_BASE_URL }}
            REVIEWER_INTERNAL_API_KEY=${{ secrets.REVIEWER_INTERNAL_API_KEY }}
            AEGRA_ASSISTANT_ID=${{ secrets.AEGRA_ASSISTANT_ID }}
            AEGRA_BASE_URL=${{ secrets.AEGRA_BASE_URL }}
          flags: --allow-unauthenticated --port=3000 --memory=1Gi --min-instances=0 --timeout=300