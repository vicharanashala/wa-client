<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live – Voice Assistant</title>
    <meta name="description" content="Voice-powered AI assistant for Indian farmers using Gemini Live">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #e17055;
            --border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background gradient */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 60% 50% at 20% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(162, 155, 254, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0, 184, 148, 0.04) 0%, transparent 60%);
            animation: gradientShift 15s ease-in-out infinite alternate;
        }

        @keyframes gradientShift {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Layout */
        .app-container {
            max-width: 860px;
            margin: 0 auto;
            padding: 20px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 2px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            border-color: rgba(0, 184, 148, 0.3);
            color: var(--success);
        }

        .status-badge.recording {
            border-color: rgba(225, 112, 85, 0.3);
            color: var(--danger);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s ease;
        }

        .status-badge.connected .status-dot {
            background: var(--success);
            box-shadow: 0 0 8px rgba(0, 184, 148, 0.5);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .status-badge.recording .status-dot {
            background: var(--danger);
            box-shadow: 0 0 8px rgba(225, 112, 85, 0.5);
            animation: pulse-dot 1s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: messageSlide 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 85%;
        }

        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.system { align-self: center; max-width: 100%; }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.2), rgba(162, 155, 254, 0.2));
            border: 1px solid rgba(108, 92, 231, 0.2);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, rgba(0, 184, 148, 0.2), rgba(0, 206, 201, 0.2));
            border: 1px solid rgba(0, 184, 148, 0.2);
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14px;
        }

        .message.ai .message-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-top-left-radius: 4px;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.15), rgba(162, 155, 254, 0.1));
            border: 1px solid rgba(108, 92, 231, 0.2);
            color: var(--text-primary);
            border-top-right-radius: 4px;
        }

        .message.system .message-bubble {
            background: rgba(253, 203, 110, 0.08);
            border: 1px solid rgba(253, 203, 110, 0.15);
            color: var(--warning);
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            text-align: center;
        }

        .message.system.tool .message-bubble {
            background: rgba(108, 92, 231, 0.08);
            border: 1px solid rgba(108, 92, 231, 0.15);
            color: var(--accent-light);
        }

        /* Waveform Visualizer */
        .waveform-container {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-height: 80px;
        }

        .wave-bar {
            width: 3px;
            min-height: 4px;
            border-radius: 3px;
            background: var(--accent);
            opacity: 0.3;
            transition: height 0.1s ease, opacity 0.15s ease;
        }

        .wave-bar.active {
            opacity: 1;
            box-shadow: 0 0 6px var(--accent-glow);
        }

        /* Mic Button */
        .controls-area {
            padding: 24px 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .mic-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: linear-gradient(145deg, var(--accent), #5a4bd1);
            color: white;
            box-shadow: 0 6px 30px var(--accent-glow);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
        }

        .mic-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 40px rgba(108, 92, 231, 0.45);
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .mic-btn.recording {
            background: linear-gradient(145deg, var(--danger), #c44339);
            box-shadow: 0 6px 30px rgba(225, 112, 85, 0.35);
            animation: micPulse 2s ease-in-out infinite;
        }

        .mic-btn.disabled {
            background: var(--bg-card);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.5;
        }

        /* Pulse ring around mic when recording */
        .mic-btn.recording::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--danger);
            animation: micRing 1.5s ease-out infinite;
        }

        @keyframes micPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes micRing {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .mic-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Welcome state */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 56px;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .welcome h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 360px;
            line-height: 1.6;
        }

        /* Audio playing indicator */
        .audio-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.2);
            font-size: 12px;
            color: var(--accent-light);
            animation: fadeIn 0.3s ease;
        }

        .audio-indicator.visible {
            display: inline-flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .mini-bars {
            display: flex;
            gap: 2px;
            align-items: center;
            height: 14px;
        }

        .mini-bar {
            width: 2px;
            background: var(--accent-light);
            border-radius: 2px;
            animation: miniBarAnim 0.6s ease-in-out infinite alternate;
        }

        .mini-bar:nth-child(1) { height: 4px; animation-delay: 0s; }
        .mini-bar:nth-child(2) { height: 8px; animation-delay: 0.15s; }
        .mini-bar:nth-child(3) { height: 12px; animation-delay: 0.3s; }
        .mini-bar:nth-child(4) { height: 6px; animation-delay: 0.45s; }

        @keyframes miniBarAnim {
            from { height: 3px; }
            to { height: 14px; }
        }

        /* Connecting overlay */
        .connecting-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .connecting-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .connecting-text {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-container { padding: 12px 16px; }
            .header-title { font-size: 17px; }
            .message { max-width: 92%; }
            .welcome h2 { font-size: 20px; }
            .mic-btn { width: 66px; height: 66px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- Connecting Overlay -->
    <div class="connecting-overlay" id="connectingOverlay">
        <div class="spinner"></div>
        <div class="connecting-text" id="connectingText">Connecting to Gemini...</div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">🌾</div>
                <div>
                    <h1 class="header-title">Gemini Live</h1>
                    <div class="header-subtitle">AI Voice Assistant</div>
                </div>
            </div>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </header>

        <!-- Chat area -->
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">🎙️</div>
                <h2>Tap the mic, start talking</h2>
                <p>Talk to Gemini Live using your voice. Ask about crop prices, weather, and much more!</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-area">
            <div class="audio-indicator" id="audioIndicator">
                <div class="mini-bars">
                    <div class="mini-bar"></div>
                    <div class="mini-bar"></div>
                    <div class="mini-bar"></div>
                    <div class="mini-bar"></div>
                </div>
                <span>Gemini is speaking...</span>
            </div>

            <button class="mic-btn disabled" id="micBtn" disabled>🎤</button>
            <div class="mic-label" id="micLabel">Connecting...</div>
        </div>
    </div>

    <script>
        // ====== State ======
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let processorNode = null;
        let isRecording = false;
        let isConnected = false;

        // Audio playback queue
        let audioQueue = [];
        let isPlaying = false;

        // ====== DOM ======
        const micBtn = document.getElementById('micBtn');
        const micLabel = document.getElementById('micLabel');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const chatArea = document.getElementById('chatArea');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const connectingOverlay = document.getElementById('connectingOverlay');
        const connectingText = document.getElementById('connectingText');
        const audioIndicator = document.getElementById('audioIndicator');

        // ====== WebSocket Connection ======
        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}`);

            ws.onopen = () => {
                console.log('Connected to server');
                connectingText.textContent = 'Setting up Gemini...';
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                switch (msg.type) {
                    case 'setup_complete':
                        isConnected = true;
                        connectingOverlay.classList.add('hidden');
                        statusBadge.className = 'status-badge connected';
                        statusText.textContent = 'Connected';
                        micBtn.classList.remove('disabled');
                        micBtn.disabled = false;
                        micLabel.textContent = 'Tap to speak';
                        break;

                    case 'text':
                        hideWelcome();
                        addMessage('ai', msg.text);
                        break;

                    case 'audio':
                        hideWelcome();
                        playAudioChunk(msg.data);
                        break;

                    case 'turn_complete':
                        audioIndicator.classList.remove('visible');
                        resetAudioQueue();
                        break;

                    case 'tool_call':
                        addSystemMessage(`⚙️ Tool: ${msg.name}`, true);
                        break;

                    case 'tool_result':
                        if (msg.success) {
                            addSystemMessage(`✅ ${msg.name} done`);
                        } else {
                            addSystemMessage(`❌ ${msg.name} failed`);
                        }
                        break;

                    case 'error':
                        addSystemMessage(`⚠️ ${msg.message}`);
                        break;

                    case 'disconnected':
                        handleDisconnect();
                        break;
                }
            };

            ws.onclose = () => {
                handleDisconnect();
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }

        function handleDisconnect() {
            isConnected = false;
            statusBadge.className = 'status-badge';
            statusText.textContent = 'Disconnected';
            micBtn.classList.add('disabled');
            micBtn.disabled = true;
            micLabel.textContent = 'Reconnecting...';
            stopRecording();

            // Auto reconnect after 3 seconds
            connectingOverlay.classList.remove('hidden');
            connectingText.textContent = 'Connection lost. Reconnecting...';
            setTimeout(connect, 3000);
        }

        // ====== Audio Recording (Browser Mic → Server) ======
        async function startRecording() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                    }
                });

                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);

                // ScriptProcessor for raw PCM data
                processorNode = audioContext.createScriptProcessor(4096, 1, 1);
                processorNode.onaudioprocess = (e) => {
                    if (!isRecording || ws?.readyState !== WebSocket.OPEN) return;

                    const float32 = e.inputBuffer.getChannelData(0);
                    // Convert Float32 to Int16 PCM
                    const int16 = new Int16Array(float32.length);
                    for (let i = 0; i < float32.length; i++) {
                        const s = Math.max(-1, Math.min(1, float32[i]));
                        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }

                    // Convert to base64
                    const bytes = new Uint8Array(int16.buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.length; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    const base64 = btoa(binary);

                    ws.send(JSON.stringify({ type: 'audio', data: base64 }));
                };

                source.connect(processorNode);
                processorNode.connect(audioContext.destination);

                isRecording = true;
                micBtn.classList.add('recording');
                micLabel.textContent = 'Listening... Tap to stop';
                statusBadge.className = 'status-badge recording';
                statusText.textContent = 'Recording';

                addMessage('user', '🎤 Recording...');

            } catch (err) {
                console.error('Mic access error:', err);
                addSystemMessage('❌ Mic access denied. Please allow microphone.');
            }
        }

        function stopRecording() {
            isRecording = false;

            if (processorNode) {
                processorNode.disconnect();
                processorNode = null;
            }
            if (audioContext) {
                audioContext.close().catch(() => {});
                audioContext = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }

            micBtn.classList.remove('recording');
            micLabel.textContent = 'Tap to speak';
            statusBadge.className = 'status-badge connected';
            statusText.textContent = 'Connected';
        }

        // Mic Button handler
        micBtn.addEventListener('click', () => {
            if (!isConnected) return;
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        // ====== Audio Playback (Server → Browser Speaker) ======
        const playbackCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        let nextPlayTime = 0; // Tracks when the next chunk should start playing

        function playAudioChunk(base64Data) {
            audioIndicator.classList.add('visible');

            // Resume AudioContext if suspended (browser autoplay policy)
            if (playbackCtx.state === 'suspended') {
                playbackCtx.resume();
            }

            // Decode base64 to Int16 PCM
            const binaryStr = atob(base64Data);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }

            const int16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768.0;
            }

            const audioBuffer = playbackCtx.createBuffer(1, float32.length, 24000);
            audioBuffer.getChannelData(0).set(float32);

            const source = playbackCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(playbackCtx.destination);

            // Schedule this chunk to play AFTER the previous one finishes
            const now = playbackCtx.currentTime;
            if (nextPlayTime < now) {
                nextPlayTime = now;
            }
            source.start(nextPlayTime);
            nextPlayTime += audioBuffer.duration;
        }

        // Reset the audio queue when a turn is complete (so next response starts fresh)
        function resetAudioQueue() {
            nextPlayTime = 0;
        }

        // ====== Chat UI Helpers ======
        function hideWelcome() {
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'ai' ? '🤖' : '👤';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;

            div.appendChild(avatar);
            div.appendChild(bubble);
            chatArea.appendChild(div);

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addSystemMessage(text, isTool = false) {
            const div = document.createElement('div');
            div.className = `message system ${isTool ? 'tool' : ''}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;

            div.appendChild(bubble);
            chatArea.appendChild(div);

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ====== Start ======
        connect();
    </script>
</body>
</html>
